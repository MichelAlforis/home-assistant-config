title: iPad
views:
  - path: accueil
    title: Accueil
    icon: mdi:tablet-dashboard
    cards:
      - type: markdown
        content: >
          # Bonjour {{ user }}
          ## Nous sommes le {{ now().strftime('%A %d %B') }}.

      - type: horizontal-stack
        cards:
          - type: weather-forecast
            entity: weather.forecast_maison
            show_current: true
            show_forecast: false
          - type: entities
            title: Accès Rapide
            show_header_toggle: false
            entities:
              - light.salondejardin
              - switch.volet_chambre
              - scene.apero_terrasse

      - type: entities
        title: Infos système
        show_header_toggle: false
        entities:
          - sensor.backup_backup_manager_state
          - entity: sun.sun
            name: Soleil

  - path: pieces
    title: Pièces
    icon: mdi:floor-plan
    cards:
      - type: entities
        title: Contrôles par pièce
        show_header_toggle: false
        entities:
          - type: section
            label: Salon
          - light.salondejardin
          - climate.sejour
          - type: section
            label: Cuisine
          - light.plafonnier_cuisine
          - sensor.temperature_cuisine
          - type: section
            label: Chambre
          - light.lampe_chevet
          - climate.chambre

  - path: materiel
    title: Matériel
    icon: mdi:devices
    cards:
      - type: entities
         title: Tous les appareils
        entities:
          - sensor.temperature_terrasse
          - switch.volet_chambre
          - switch.prise_salon

  - path: scenarios
    title: Scénarios
    icon: mdi:script-text-outline
    cards:
      - type: entities
        title: Scénarios et Automatisations
        entities:
          - scene.apero_terrasse
          - automation.fermeture_volets_nuit
