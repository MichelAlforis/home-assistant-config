background: center / cover no-repeat url("/local/fond_tablette.webp") fixed
theme: alforis-tablette
device_preference: desktop
button_card_templates:
  base-button:
    size: 100%
    show_state: false
    show_name: true
    show_icon: true
    styles:
      card:
        - backdrop-filter: blur(15px)
        - border-radius: 16px
        - padding: 16px
        - margin: 8px 0px
        - transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)
        - box-shadow: 0 4px 16px rgba(0,0,0,0.15)
        - position: relative
        - overflow: hidden
        - height: 70px
        - min-height: 70px
        - max-height: 70px
        - border: 2px solid transparent
      icon:
        - width: 32px
        - height: 32px
        - color: white
        - margin-bottom: 8px
        - filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3))
      name:
        - font-size: 14px
        - font-weight: 700
        - color: white
        - text-align: center
        - line-height: 1.2
        - text-shadow: 0 2px 4px rgba(0,0,0,0.5)
        - letter-spacing: 0.3px
    tap_action:
      haptic: medium
    hold_action:
      action: more-info
      haptic: heavy
  piece-button:
    template: base-button
  materiel-button:
    template: base-button
  scenario-button:
    template: base-button
    tap_action:
      haptic: success
  nav-button:
    size: 100%
    show_state: false
    show_name: true
    show_icon: true
    styles:
      card:
        - backdrop-filter: blur(15px)
        - border-radius: 16px
        - padding: 16px
        - margin: 8px 0px
        - transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)
        - box-shadow: 0 4px 16px rgba(0,0,0,0.15)
        - position: relative
        - overflow: hidden
        - height: 70px
        - min-height: 70px
        - max-height: 70px
        - border: 2px solid transparent
        - background: >-
            linear-gradient(135deg, rgba(var(--rgb-primary-color), 0.8),
            rgba(var(--rgb-accent-color), 0.6))
      icon:
        - width: 32px
        - height: 32px
        - color: white
        - margin-bottom: 8px
        - filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3))
      name:
        - font-size: 14px
        - font-weight: 700
        - color: white
        - text-align: center
        - line-height: 1.2
        - text-shadow: 0 2px 4px rgba(0,0,0,0.5)
        - letter-spacing: 0.3px
    tap_action:
      haptic: medium
    hold_action:
      action: more-info
      haptic: heavy
mod_section:
  type: custom:mod-card
  card_mod:
    style: |
      .card-content {
        padding: 16px;
        background: rgba(var(--rgb-card-background-color), 0.85);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        border: 1px solid rgba(var(--rgb-primary-color), 0.15);
        box-shadow: 0 6px 24px rgba(0,0,0,0.1);
        margin: 0 8px 16px 16px;
      }
grid_1col:
  type: grid
  columns: 1
  square: false
  card_mod:
    style: |
      hui-grid-card {
        display: grid !important;
        grid-template-rows: repeat(auto-fit, 84px) !important;
        grid-gap: 8px !important;
      }
views:
  - title: Accueil
    path: accueil
    panel: true
    theme: alforis-tablette
    background:
      image: /local/fond_tablette.webp
      size: cover
      alignment: center
      repeat: no-repeat
      attachment: fixed
    cards:
      - type: custom:layout-card
        layout_type: vertical
        layout_options:
          max_cols: 1
        card_mod:
          style: |
            ha-card {
              background: transparent !important;
              box-shadow: none !important;
              padding: 0 5% !important;
            }
        cards:
          - type: custom:vertical-stack-in-card
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                }
            cards:
              - type: horizontal-stack
                card_mod:
                  style: |
                    ha-card {
                      background: transparent;
                      box-shadow: none;
                      display: flex;
                      justify-content: center;
                      padding: 0 16px;
                    }
                    .card-content { text-align: center; width:100%; }
                cards:
                  - type: markdown
                    content: >
                      ## 🏠 Bonjour {{ user }}

                      *{{ now().strftime('%A %d %B %Y') }} - Maison connectée*

                      **🌡️ {{ states('sensor.temp_salon') }}°C** • **⚡ {{
                      states('sensor.consommation_electrique') }}W**
                    card_mod:
                      style: |
                        ha-card {
                          background: transparent;
                          box-shadow: none;
                          padding: 0;
                          flex: 1;
                        }
                        .card-content {
                          padding: 0 !important;
                        }
                        h2 {
                          margin: 0 0 8px 0;
                          font-size: 24px;
                          background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
                          -webkit-background-clip: text;
                          -webkit-text-fill-color: transparent;
                        }
                        em {
                          font-size: 14px;
                          color: var(--secondary-text-color);
                          display: block;
                          margin-bottom: 8px;
                        }
                        strong {
                          font-size: 13px;
                          color: var(--accent-color);
                        }
                  - type: custom:button-card
                    icon: mdi:cog
                    size: 40px
                    show_name: false
                    tap_action:
                      action: navigate
                      navigation_path: /config/dashboard
                    styles:
                      card:
                        - background: rgba(var(--rgb-primary-color), 0.1)
                        - border-radius: 16px
                        - width: 56px
                        - height: 56px
                        - margin-left: 16px
                      icon:
                        - color: var(--primary-color)
          - type: horizontal-stack
            cards:
              - type: weather-forecast
                entity: weather.home
                show_current: true
                show_forecast: true
                forecast_type: dayly
                card_mod:
                  style: |
                    ha-card {
                      border-radius: 20px;
                      backdrop-filter: blur(20px);
                      background: linear-gradient(135deg,
                        rgba(66, 165, 245, 0.2),
                        rgba(33, 150, 243, 0.1));
                      border: 2px solid rgba(66, 165, 245, 0.3);
                      padding: 16px;
                      margin: 0 8px 16px 16px;
                      box-shadow: 0 6px 24px rgba(66, 165, 245, 0.2);
                      overflow: hidden;
                      position: relative;
                      flex: 1;
                    }
              - type: custom:mod-card
                style:
                  card:
                    - background: rgba(var(--rgb-card-background-color), 0.85)
                    - backdrop-filter: blur(20px)
                    - border-radius: 20px
                    - border: 1px solid rgba(var(--rgb-accent-color), 0.2)
                    - box-shadow: 0 6px 24px rgba(0,0,0,0.1)
                    - padding: 16px
                    - margin: 0 16px 16px 8px
                    - flex: 2
                card:
                  type: vertical-stack
                  cards:
                    - type: markdown
                      content: |
                        ### 🌡️ Climat intérieur
                      card_mod:
                        style: |
                          ha-card {
                            background: transparent;
                            box-shadow: none;
                            padding: 0 0 8px 0;
                          }
                          h3 {
                            margin: 0;
                            background: linear-gradient(90deg, var(--accent-color), var(--primary-color));
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            font-weight: 700;
                            font-size: 18px;
                          }
                    - type: grid
                      square: false
                      columns: 3
                      card_mod:
                        style: |
                          hui-grid-card {
                            display: grid !important;
                            grid-template-rows: repeat(auto-fit, 84px) !important;
                            grid-gap: 8px !important;
                          }
                      cards:
                        - type: custom:button-card
                          entity: climate.rdc
                          name: 🏠 Thermostat RDC
                          show_state: true
                          show_last_changed: true
                          template: nav-button
                        - type: custom:button-card
                          entity: sensor.temp_salon
                          name: 🛋️ Salon
                          show_state: true
                          show_last_changed: true
                          template: nav-button
                        - type: custom:button-card
                          entity: sensor.temp_chambre
                          name: 🛏️ Chambre
                          show_state: true
                          show_last_changed: true
                          template: nav-button
                        - type: custom:button-card
                          entity: sensor.humidity_salon
                          name: 💧 Humidité salon
                          show_state: true
                          show_last_changed: true
                          template: nav-button
                        - type: custom:button-card
                          entity: sensor.temp_cuisine
                          name: 🍳 Cuisine
                          show_state: true
                          show_last_changed: true
                          template: nav-button
                        - type: custom:button-card
                          entity: sensor.temp_bureau
                          name: 💼 Bureau
                          show_state: true
                          show_last_changed: true
                          template: nav-button
          - type: horizontal-stack
            cards:
              - type: custom:mod-card
                card_mod:
                  style: |
                    .card-content {
                      padding: 16px;
                      background: rgba(var(--rgb-card-background-color), 0.85);
                      backdrop-filter: blur(20px);
                      border-radius: 20px;
                      border: 1px solid rgba(var(--rgb-primary-color), 0.15);
                      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
                      margin: 0 8px 16px 16px;
                    }
                card:
                  type: vertical-stack
                  cards:
                    - type: markdown
                      content: |
                        ### 🏠 Pièces
                      card_mod:
                        style: |
                          ha-card {
                            background: transparent;
                            box-shadow: none;
                            padding: 0 0 8px 0;
                          }
                          h3 {
                            margin: 0;
                            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            font-weight: 700;
                            font-size: 16px;
                          }
                    - type: grid
                      columns: 1
                      square: false
                      card_mod:
                        style: |
                          hui-grid-card {
                            display: grid !important;
                            grid-template-rows: repeat(auto-fit, 84px) !important;
                            grid-gap: 8px !important;
                          }
                      cards:
                        - type: custom:button-card
                          template: piece-button
                          name: 🏠 RDC
                          icon: mdi:home-floor-0
                          tap_action:
                            action: navigate
                            navigation_path: /lovelace/rdc
                          styles:
                            card:
                              - background: >-
                                  linear-gradient(135deg, rgba(21, 101, 192,
                                  0.9), rgba(25, 118, 210, 0.8))
                              - border: 2px solid rgba(21, 101, 192, 0.7)
                        - type: custom:button-card
                          template: piece-button
                          name: 🏠 R+1
                          icon: mdi:home-floor-1
                          tap_action:
                            action: navigate
                            navigation_path: /lovelace/etage1
                          styles:
                            card:
                              - background: >-
                                  linear-gradient(135deg, rgba(25, 118, 210,
                                  0.9), rgba(33, 150, 243, 0.8))
                              - border: 2px solid rgba(25, 118, 210, 0.7)
                        - type: custom:button-card
                          template: piece-button
                          name: 🏠 R+2
                          icon: mdi:home-floor-2
                          tap_action:
