                            navigation_path: /lovelace/etage2
                          styles:
                            card:
                              - background: >-
                                  linear-gradient(135deg, rgba(33, 150, 243,
                                  0.9), rgba(66, 165, 245, 0.8))
                              - border: 2px solid rgba(33, 150, 243, 0.7)
              - type: custom:mod-card
                card_mod:
                  style: |
                    .card-content {
                      padding: 16px;
                      background: rgba(var(--rgb-card-background-color), 0.85);
                      backdrop-filter: blur(20px);
                      border-radius: 20px;
                      border: 1px solid rgba(var(--rgb-accent-color), 0.15);
                      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
                      margin: 0 8px 16px 8px;
                    }
                card:
                  type: vertical-stack
                  cards:
                    - type: markdown
                      content: |
                        ### 🧰 Matériel
                      card_mod:
                        style: |
                          ha-card {
                            background: transparent;
                            box-shadow: none;
                            padding: 0 0 8px 0;
                          }
                          h3 {
                            margin: 0;
                            background: linear-gradient(90deg, var(--accent-color), var(--primary-color));
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            font-weight: 700;
                            font-size: 16px;
                          }
                    - type: grid
                      square: false
                      columns: 1
                      card_mod:
                        style: |
                          hui-grid-card {
                            display: grid !important;
                            grid-template-rows: repeat(auto-fit, 84px) !important;
                            grid-gap: 8px !important;
                          }
                      cards:
                        - type: custom:button-card
                          template: materiel-button
                          name: 🪟 Volets
                          icon: mdi:window-shutter
                          tap_action:
                            action: navigate
                            navigation_path: /lovelace/volets
                          styles:
                            card:
                              - background: >-
                                  linear-gradient(135deg, rgba(245, 127, 23,
                                  0.9), rgba(255, 152, 0, 0.8))
                              - border: 2px solid rgba(245, 127, 23, 0.7)
                        - type: custom:button-card
                          template: materiel-button
                          name: 🌡️ Température
                          icon: mdi:thermometer
                          tap_action:
                            action: navigate
                            navigation_path: /lovelace/temperature
                          styles:
                            card:
                              - background: >-
                                  linear-gradient(135deg, rgba(255, 152, 0,
                                  0.9), rgba(255, 193, 7, 0.8))
                              - border: 2px solid rgba(255, 152, 0, 0.7)
                        - type: custom:button-card
                          template: materiel-button
                          name: 🔌 Électroménager
                          icon: mdi:washing-machine
                          tap_action:
                            action: navigate
                            navigation_path: /lovelace/electromenager
                          styles:
                            card:
                              - background: >-
                                  linear-gradient(135deg, rgba(255, 193, 7,
                                  0.9), rgba(255, 235, 59, 0.8))
                              - border: 2px solid rgba(255, 193, 7, 0.7)
                        - type: custom:button-card
                          template: materiel-button
                          name: 🌿 Extérieur
                          icon: mdi:pine-tree
                          tap_action:
                            action: navigate
                            navigation_path: /lovelace/exterieur
                          styles:
                            card:
                              - background: >-
                                  linear-gradient(135deg, rgba(255, 235, 59,
                                  0.9), rgba(205, 220, 57, 0.8))
                              - border: 2px solid rgba(255, 235, 59, 0.7)
              - type: custom:mod-card
                card_mod:
                  style: |
                    .card-content {
                      padding: 16px;
                      background: rgba(var(--rgb-card-background-color), 0.85);
                      backdrop-filter: blur(20px);
                      border-radius: 20px;
                      border: 1px solid rgba(var(--rgb-secondary-color), 0.15);
                      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
                      margin: 0 16px 16px 8px;
                    }
                card:
                  type: vertical-stack
                  cards:
                    - type: markdown
                      content: |
                        ### 🎬 Scénarios
                      card_mod:
                        style: |
                          ha-card {
                            background: transparent;
                            box-shadow: none;
                            padding: 0 0 8px 0;
                          }
                          h3 {
                            margin: 0;
                            background: linear-gradient(90deg, var(--secondary-color), var(--accent-color));
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            font-weight: 700;
                            font-size: 16px;
                          }
                    - type: grid
                      square: false
                      columns: 1
                      card_mod:
                        style: |
                          hui-grid-card {
                            display: grid !important;
                            grid-template-rows: repeat(auto-fit, 84px) !important;
                            grid-gap: 8px !important;
                          }
                      cards:
                        - type: custom:button-card
                          template: scenario-button
                          name: 🌅 Réveil
                          icon: mdi:weather-sunny
                          tap_action:
                            action: call-service
                            service: script.scenario_reveil
                            confirmation:
                              text: Lancer le scénario réveil ?
                          styles:
                            card:
                              - background: >-
                                  linear-gradient(135deg, rgba(255, 193, 7,
                                  0.9), rgba(255, 152, 0, 0.8))
                              - border: 2px solid rgba(255, 193, 7, 0.8)
                        - type: custom:button-card
                          template: scenario-button
                          name: 🌙 Coucher
                          icon: mdi:weather-night
                          tap_action:
                            action: call-service
                            service: script.scenario_coucher
                            confirmation:
                              text: Lancer le scénario coucher ?
                          styles:
                            card:
                              - background: >-
                                  linear-gradient(135deg, rgba(63, 81, 181,
                                  0.9), rgba(103, 58, 183, 0.8))
                              - border: 2px solid rgba(63, 81, 181, 0.8)
