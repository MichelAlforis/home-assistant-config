# ──────────── Templates & Ancres ────────────
mod_section: &mod_section
  type: custom:mod-card
  card_mod:
    style: |
      .card-content {
        padding: 16px;
        background: rgba(var(--rgb-card-background-color), 0.85);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        border: 1px solid rgba(var(--rgb-primary-color), 0.15);
        box-shadow: 0 6px 24px rgba(0,0,0,0.1);
        margin: 0 8px 16px 16px;
      }

grid_1col: &grid_1col
  type: grid
  columns: 1
  square: false
  card_mod:
    style: |
      hui-grid-card {
        display: grid !important;
        grid-template-rows: repeat(auto-fit, 84px) !important;
        grid-gap: 8px !important;
      }
button_card_templates:
  base-button:
    size: 100%
    show_state: false
    show_name: true
    show_icon: true
    styles:
      card:
        - backdrop-filter: blur(15px)
        - border-radius: 16px
        - padding: 16px
        - margin: 8px 0px
        - transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)
        - box-shadow: 0 4px 16px rgba(0,0,0,0.15)
        - position: relative
        - overflow: hidden
        - height: 70px
        - min-height: 70px
        - max-height: 70px
        - border: 2px solid transparent
      icon:
        - width: 32px
        - height: 32px
        - color: white
        - margin-bottom: 8px
        - filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3))
      name:
        - font-size: 14px
        - font-weight: 700
        - color: white
        - text-align: center
        - line-height: 1.2
        - text-shadow: 0 2px 4px rgba(0,0,0,0.5)
        - letter-spacing: 0.3px
    tap_action:
      haptic: medium
    hold_action:
      action: more-info
      haptic: heavy
  piece-button:
    template: base-button
  materiel-button:
    template: base-button
  scenario-button:
    template: base-button
    tap_action:
      haptic: success
  nav-button:
    size: 100%
    show_state: false
    show_name: true
    show_icon: true
    styles:
      card:
        - backdrop-filter: blur(15px)
        - border-radius: 16px
        - padding: 16px
        - margin: 8px 0px
        - transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)
        - box-shadow: 0 4px 16px rgba(0,0,0,0.15)
        - position: relative
        - overflow: hidden
        - height: 70px
        - min-height: 70px
        - max-height: 70px
        - border: 2px solid transparent
        - background: >-
            linear-gradient(135deg, rgba(var(--rgb-primary-color), 0.8),
            rgba(var(--rgb-accent-color), 0.6))
      icon:
        - width: 32px
        - height: 32px
        - color: white
        - margin-bottom: 8px
        - filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3))
      name:
        - font-size: 14px
        - font-weight: 700
        - color: white
        - text-align: center
        - line-height: 1.2
        - text-shadow: 0 2px 4px rgba(0,0,0,0.5)
        - letter-spacing: 0.3px
    tap_action:
      haptic: medium
    hold_action:
      action: more-info
      haptic: heavy

# ──────────── La Vue Accueil ────────────
views:
  - title: Accueil
    path: accueil
    panel: true
    theme: alforis-tablette
    background:
      image: /local/fond_tablette.webp
      size: cover
      alignment: center
      repeat: no-repeat
      attachment: fixed

    card_mod:
      style: |
        /* 1) Marges horizontales sur le panel uniquement */
        :host, hui-view, #view {
          padding-left: 5vw !important;
          padding-right: 5vw !important;
        }
        /* 2) Ne vise que le panel principal */
        :host > hui-view > #view > ha-card {
          background: transparent !important;
          box-shadow: none       !important;
        }

    cards:
      - type: custom:vertical-stack-in-card
        card_mod:
          style: |
            ha-card {
              background: transparent !important;
              box-shadow: none       !important;
            }
        cards:

          # === ENTÊTE ===
          - type: markdown
            content: >
              ## 🏠 Bonjour {{ user }}
              *{{ now().strftime('%A %d %B %Y') }} - Maison connectée*
              **🌡️ {{ states('sensor.temp_salon') }}°C** • **⚡ {{ states('sensor.consommation_electrique') }}W**
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  box-shadow: none;
                  text-align: center;
                  padding: 16px 0;
                }

          # === MÉTÉO + CLIMAT ===
          - type: horizontal-stack
            cards:
              - type: weather-forecast
                entity: weather.home
                show_current: true
                show_forecast: true
                forecast_type: daily
                card_mod:
                  style: |
                    ha-card {
                      border-radius: 20px;
                      backdrop-filter: blur(20px);
                      background: rgba(255,255,255,0.1);
                      padding: 16px;
                      margin: 8px;
                      box-shadow: none;
                    }
              - type: grid
                columns: 3
                square: false
                card_mod:
                  style: |
                    hui-grid-card {
                      display: grid !important;
                      grid-template-columns: repeat(auto-fit, minmax(160px,1fr)) !important;
                      gap: 12px !important;
                    }
                cards:
                  - type: custom:button-card
                    template: nav-button
                    entity: climate.rdc
                    name: 🏠 Thermostat RDC
                  - type: custom:button-card
                    template: nav-button
                    entity: sensor.temp_salon
                    name: 🛋️ Salon
                  - type: custom:button-card
                    template: nav-button
                    entity: sensor.temp_chambre
                    name: 🛏️ Chambre

          # === PIÈCES / MATÉRIEL / SCÉNARIOS ===
          - type: horizontal-stack
            cards:
              - <<: *mod_section
                card:
                  <<: *grid_1col
                  cards:
                    - type: custom:button-card
                      template: piece-button
                      name: 🏠 RDC
                    - type: custom:button-card
                      template: piece-button
                      name: 🏠 R+1

              - <<: *mod_section
                card:
                  <<: *grid_1col
                  cards:
                    - type: custom:button-card
                      template: materiel-button
                      name: 🪟 Volets
                    - type: custom:button-card
                      template: materiel-button
                      name: 🌡️ Température

              - <<: *mod_section
                card:
                  <<: *grid_1col
                  cards:
                    - type: custom:button-card
                      template: scenario-button
                      name: 🌅 Réveil
                    - type: custom:button-card
                      template: scenario-button
                      name: 🎉 Fête
